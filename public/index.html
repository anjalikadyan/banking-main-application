<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Horizon</title>
    <meta
      name="description"
      content="Horizon - Fintech banking demo. Continue to sign in."
    />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b1020;
        --card: rgba(255, 255, 255, 0.06);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.7);
        --link: #7dd3fc;
        --border: rgba(255, 255, 255, 0.12);
      }
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background: radial-gradient(
            1200px 700px at 20% 20%,
            rgba(125, 211, 252, 0.16),
            transparent 60%
          ),
          radial-gradient(
            1200px 700px at 80% 30%,
            rgba(167, 139, 250, 0.16),
            transparent 55%
          ),
          var(--bg);
        color: var(--text);
      }
      .wrap {
        height: 100%;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(720px, 100%);
        border: 1px solid var(--border);
        background: var(--card);
        border-radius: 16px;
        padding: 28px;
        backdrop-filter: blur(10px);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
        letter-spacing: 0.2px;
      }
      p {
        margin: 0 0 16px;
        color: var(--muted);
        line-height: 1.5;
      }
      a {
        color: var(--link);
        text-decoration: none;
        font-weight: 600;
      }
      a:hover {
        text-decoration: underline;
      }
      .row {
        display: flex;
        gap: 16px;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        margin-top: 16px;
      }
      .btn {
        display: inline-block;
        padding: 10px 14px;
        border-radius: 12px;
        background: rgba(125, 211, 252, 0.14);
        border: 1px solid rgba(125, 211, 252, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <main class="card">
        <h1>Horizon</h1>
        <p>
          If you’re seeing this page on a static host, the app isn’t running as a
          Next.js server here. Continue to sign in (only works when the Next.js
          app is deployed as a web service).
        </p>
        <div class="row">
          <a class="btn" href="/sign-in">Go to Sign in</a>
          <a href="/sign-up">Create account</a>
        </div>
      </main>
    </div>
  </body>
</html>
